<!DOCTYPE html>

<html>
<head>
  <title>ESP32 Live Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: 'Segoe UI';
      background: #f4f6f9;
      text-align: center;
      margin: 0;
    }

    .header {
      background: linear-gradient(135deg, #4CAF50, #2ecc71);
      color: white;
      padding: 20px;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin: 10px auto;
      width: 90%;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
    }

    .result {
      font-size: 24px;
      font-weight: bold;
    }

    .pure {
      color: green;
    }

    .adulterated {
      color: red;
    }

    canvas {
      background: white;
      border-radius: 10px;
      margin-top: 20px;
    }
  </style>

</head>

<body>

<div class="header">
  🌿 Adulteration Detection Dashboard (Live)
</div>

<div class="container">

  <div class="card">
    <h3>Latest Result</h3>
    <div id="result" class="result">Loading...</div>
  </div>

  <div class="card">
    <canvas id="chart"></canvas>
  </div>

</div>

<script>

const channelID = "3314593";
const apiKey = "GWAZZIWPK2RQKA0Z";

const url = `https://api.thingspeak.com/channels/${channelID}/feeds.json?api_key=${apiKey}&results=20`;

fetch(url)
.then(res => res.json())
.then(data => {

  console.log(data); 

  if (!data.feeds || data.feeds.length === 0) {
    document.getElementById("result").innerHTML = "❌ No Data Found";
    return;
  }

  const time = data.feeds.map(f => new Date(f.created_at).toLocaleTimeString());

  const gas = data.feeds.map(f => Number(f.field4) || 0);
  const ratio = data.feeds.map(f => Number(f.field7) || 0);
  const temp = data.feeds.map(f => Number(f.field5) || 0);
  const resultField = data.feeds.map(f => Number(f.field8));

  
  const ctx = document.getElementById('chart').getContext('2d');

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: time,
      datasets: [
        {
          label: "Gas",
          data: gas,
          borderColor: "#2ecc71",
          fill: false
        },
        {
          label: "G/R Ratio",
          data: ratio,
          borderColor: "#f39c12",
          fill: false
        },
        {
          label: "Temperature",
          data: temp,
          borderColor: "#e74c3c",
          fill: false
        }
      ]
    }
  });

  let latestResult = resultField[resultField.length - 1];

  let resultText = "";
  let className = "";

  if (latestResult == 1) {
    resultText = "🟢 PURE SAMPLE";
    className = "pure";
  } else {
    resultText = "🔴 ADULTERATED SAMPLE";
    className = "adulterated";
  }

  let resultElem = document.getElementById("result");
  resultElem.innerHTML = resultText;
  resultElem.className = "result " + className;

})
.catch(err => {
  document.getElementById("result").innerHTML = "❌ Error loading data";
  console.error(err);
});


setInterval(() => location.reload(), 15000);

</script>

</body>
</html>
